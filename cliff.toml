# Configuration git-cliff — génère le CHANGELOG depuis les commits conventionnels.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to Tricouture.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]\
(https://github.com/lguerard/tricouture/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
{% if github.contributors | length > 0 %}
### 👥 Contributeurs

{% for contributor in github.contributors | sort(attribute="username") %}\
- [@{{ contributor.username }}](https://github.com/{{ contributor.username }})
{% endfor %}
{% endif %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Regroupe par type ; l'icône est conservée dans le message.
commit_parsers = [
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug fixes" },
  { message = "^docs", group = "📝 Documentation" },
  { message = "^style", group = "💄 Style" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^test", group = "✅ Tests" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^ci", group = "👷 CI/CD" },
  { message = "^build", group = "🏗️ Build" },
  { message = "^chore", group = "🔧 Miscellaneous" },
  { message = "^revert", group = "⏪ Reverts" },
  { message = ".*", group = "🔧 Miscellaneous" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "[0-9]*"
topo_order = false
sort_commits = "oldest"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true

# GitHub integration: lists contributors (github.contributors) in release notes.
# Requires GITHUB_TOKEN at runtime (provided by GHA).
[remote.github]
owner = "lguerard"
repo = "tricouture"
