# Override to enable AI sidecars on GPU (phases 3-5).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Host prerequisite: NVIDIA driver + nvidia-container-toolkit.
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # No port exposed: consumed by "app" via the compose network.

  # Downloads models on first start then exits.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - >
        sleep 6;
        ollama pull ${OLLAMA_CHAT_MODEL:-qwen2.5:7b} &&
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    restart: "no"

  # Vision service (label OCR, gauge sample, image embeddings) — phase 4.
  vision:
    build: ./services/vision
    restart: unless-stopped
    volumes:
      - media:/data/media:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Whisper service (hands-free voice transcription) — phase 5.
  whisper:
    build: ./services/whisper
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Stable Diffusion service (colorway preview) — phase 5.
  # Model configurable via SD_MODEL_ID (default SD 2.1-base ~4 GB VRAM).
  # First start: downloads HuggingFace weights (~5-6 GB).
  sd:
    build: ./services/sd
    restart: unless-stopped
    environment:
      SD_MODEL_ID: ${SD_MODEL_ID:-stabilityai/stable-diffusion-2-1-base}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  models:
  media:
