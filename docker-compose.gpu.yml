# Override pour activer les sidecars IA sur GPU (phases 3-5).
# Usage : docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Prérequis hôte : pilote NVIDIA + nvidia-container-toolkit.
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Pas de port exposé : consommé par "app" via le réseau compose.

  # Télécharge les modèles au premier démarrage puis s'arrête.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - >
        sleep 6;
        ollama pull ${OLLAMA_CHAT_MODEL:-qwen2.5:7b} &&
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    restart: "no"

  # Service vision (OCR étiquettes, échantillon, embeddings image) — phase 4.
  vision:
    build: ./services/vision
    restart: unless-stopped
    volumes:
      - media:/data/media:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Service Whisper (transcription vocale mains-libres) — phase 5.
  whisper:
    build: ./services/whisper
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Service Stable Diffusion (aperçu coloris) — phase 5.
  # Modèle configurable via SD_MODEL_ID (défaut SD 2.1-base ~4 GB VRAM).
  # Premier démarrage : télécharge les poids HuggingFace (~5-6 GB).
  sd:
    build: ./services/sd
    restart: unless-stopped
    environment:
      SD_MODEL_ID: ${SD_MODEL_ID:-stabilityai/stable-diffusion-2-1-base}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  models:
  media:
