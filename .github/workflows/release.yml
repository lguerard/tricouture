name: Release

# On every push to main: compute next version via git-cliff,
# build the Android APK, publish a GitHub Release, then take screenshots.
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cliff.outputs.version }}
      released: ${{ steps.cliff.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Compute version and release notes
        id: cliff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(git cliff --config cliff.toml --bumped-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # If no new conventional commits, skip the release.
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already tagged — skipping release."
            exit 0
          fi
          echo "released=true" >> "$GITHUB_OUTPUT"

          git cliff --config cliff.toml --tag "$VERSION" -o CHANGELOG.md
          git cliff --config cliff.release.toml --latest --tag "$VERSION" --strip all -o RELEASE_NOTES.md
          echo "Next version: $VERSION"

      - name: Upload release notes
        if: steps.cliff.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md

  android:
    needs: changelog
    if: needs.changelog.outputs.released == 'true'
    uses: ./.github/workflows/android.yml

  publish:
    needs: [changelog, android]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ needs.changelog.outputs.version }}
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: tricouture-android-debug
          path: apk

      - name: Download release APK (if signed)
        uses: actions/download-artifact@v4
        with:
          name: tricouture-android-release
          path: apk-release
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.version }}
          name: ${{ needs.changelog.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            apk/app-debug.apk
            apk-release/app-release.apk

  screenshots:
    needs: [changelog, android, publish]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tricouture
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tricouture
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgres://tricouture:test@localhost:5432/tricouture
      ORIGIN: http://10.0.2.2:3000
      AUTH_SECRET: screenshots-ci-secret-not-for-prod
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v4

      # ── Web app ─────────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Apply database migrations
        working-directory: app
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector;"
          sed 's/-->.*statement-breakpoint//g' drizzle/0000_pink_banshee.sql | psql "$DATABASE_URL"
          # Vector indexes (migration 0001) — skip errors if pgvector doesn't support hnsw yet
          psql "$DATABASE_URL" -f drizzle/0001_vector_indexes.sql 2>/dev/null || true

      - name: Seed demo data
        working-directory: app
        run: node scripts/seed-demo.mjs

      - name: Build SvelteKit app
        working-directory: app
        run: npm run build

      - name: Start server
        working-directory: app
        run: node build &
        env:
          PORT: 3000
          HOST: 0.0.0.0

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/login && break
            sleep 2
          done

      # ── APK (reuse artifact from android job) ──────────────────────────────
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: tricouture-android-debug
          path: apk

      # ── Android emulator + Maestro ──────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          heap-size: 512M
          avd-name: screenshot-device
          disable-animations: true
          emulator-options: -no-snapshot-save -no-audio -no-boot-anim -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            adb install apk/app-debug.apk
            sleep 5
            maestro test maestro/screenshots.yaml --output maestro-output
            cp maestro-output/screenshots/*.png . 2>/dev/null || \
              find . -name "*.png" -path "*/screenshots/*" -exec cp {} . \;

      # ── Upload screenshots to GitHub Release ────────────────────────────────
      - name: Upload screenshots to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.version }}
          files: "*.png"

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          if-no-files-found: warn
