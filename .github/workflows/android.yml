name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Tricouture server URL (falls back to SERVER_URL repo variable)"
        required: false
        type: string
  # Allows other workflows (release) to reuse this build.
  workflow_call:
    inputs:
      server_url:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Resolve server URL
        id: url
        run: |
          URL="${{ github.event.inputs.server_url }}"
          if [ -z "$URL" ]; then URL="${{ vars.SERVER_URL }}"; fi
          echo "value=$URL" >> "$GITHUB_OUTPUT"
          echo "Server URL: ${URL:-(not set, config shell will be shown)}"

      - name: Add Android platform
        working-directory: mobile
        env:
          CAP_SERVER_URL: ${{ steps.url.outputs.value }}
        run: npx cap add android

      - name: Inject runtime permissions (camera, mic, notifications, vibration)
        working-directory: mobile
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          add_perm() {
            grep -q "\"$1\"" "$MANIFEST" || \
              perl -0pi -e "s|(<uses-permission android:name=\"android.permission.INTERNET\" />)|\$1\n    <uses-permission android:name=\"$1\" />|" "$MANIFEST"
          }
          add_perm "android.permission.CAMERA"
          add_perm "android.permission.RECORD_AUDIO"
          add_perm "android.permission.POST_NOTIFICATIONS"
          add_perm "android.permission.VIBRATE"
          add_perm "android.permission.RECEIVE_BOOT_COMPLETED"
          echo "--- permissions ---"; grep uses-permission "$MANIFEST" || true

      - name: Capacitor sync
        working-directory: mobile
        env:
          CAP_SERVER_URL: ${{ steps.url.outputs.value }}
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tricouture-android-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Release signing (optional) — enabled when KEYSTORE_BASE64 secret is set.
      # Generate keystore: keytool -genkey -v -keystore tricouture.jks -alias tricouture
      #   -keyalg RSA -keysize 2048 -validity 10000
      # Encode:  base64 -w 0 tricouture.jks > tricouture.jks.b64
      # Required GitHub secrets:
      #   KEYSTORE_BASE64      – base64-encoded .jks file content
      #   KEYSTORE_PASSWORD    – keystore password
      #   KEY_ALIAS            – key alias (e.g. tricouture)
      #   KEY_PASSWORD         – key password
      - name: Sign release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/tricouture.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/tricouture.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon
          rm -f /tmp/tricouture.jks

      - name: Upload release APK artifact
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tricouture-android-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
