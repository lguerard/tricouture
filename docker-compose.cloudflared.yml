# Expose Tricouture via Cloudflare Tunnel (no ports to open, automatic HTTPS).
# Usage:
#   1) Create a tunnel in Cloudflare Zero Trust, route the public hostname to http://app:3000
#   2) Put the token in .env: CLOUDFLARE_TUNNEL_TOKEN=...
#   3) docker compose -f docker-compose.yml -f docker-compose.cloudflared.yml up -d
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
