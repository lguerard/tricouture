# Expose Tricouture via Cloudflare Tunnel (aucun port à ouvrir, HTTPS automatique).
# Usage :
#   1) Crée un tunnel sur Cloudflare Zero Trust, route le hostname public vers HTTP://app:3000
#   2) Mets le token dans .env : CLOUDFLARE_TUNNEL_TOKEN=...
#   3) docker compose -f docker-compose.yml -f docker-compose.cloudflared.yml up -d
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
