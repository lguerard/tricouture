appId: app.tricouture
---
# Login screen
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Sign in"
    timeout: 15000
- takeScreenshot: screenshots/01-login
- tapOn: "Email"
- inputText: "demo@tricouture.app"
- tapOn: "Password"
- inputText: "Demo1234!"
- tapOn: "Sign in"

# Dashboard
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 20000
- waitForAnimationToEnd
- takeScreenshot: screenshots/02-dashboard

# Patterns
- tapOn: "Patterns"
- extendedWaitUntil:
    visible: "Irish Cable"
    timeout: 10000
- takeScreenshot: screenshots/03-patterns

# Projects (Kanban)
- tapOn: "Projects"
- extendedWaitUntil:
    visible: "Kanban"
    timeout: 10000
- takeScreenshot: screenshots/04-projects

# Stash
- tapOn: "Stash"
- extendedWaitUntil:
    visible: "Drops"
    timeout: 10000
- takeScreenshot: screenshots/05-stash

# Stats (My year)
- tapOn: "My year"
- waitForAnimationToEnd
- takeScreenshot: screenshots/06-stats

# Goals
- tapOn: "Goals"
- waitForAnimationToEnd
- takeScreenshot: screenshots/07-goals
